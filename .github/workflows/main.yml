name: Build EduNest APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Unzip Source Files
      run: unzip app.zip -d source_code
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Find and Build APK
      run: |
        # Automatically search for the gradlew file inside the unzipped folder
        GRADLE_PATH=$(find source_code -name "gradlew" | head -n 1)
        
        if [ -z "$GRADLE_PATH" ]; then
          echo "Error: Could not find the gradlew file in your ZIP."
          exit 1
        fi
        
        # Get the directory that contains the gradlew file
        GRADLE_DIR=$(dirname "$GRADLE_PATH")
        echo "Found Android project in: $GRADLE_DIR"
        
        # Navigate to that specific directory and build
        cd "$GRADLE_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: edunest-debug-apk
        # The ** wildcard tells GitHub to search all folders for the finished APK
        path: '**/*.apk'
        
