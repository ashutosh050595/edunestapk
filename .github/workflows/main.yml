name: Build EduNest Capacitor APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Unzip Source Files
      run: unzip app.zip -d source_code

    - name: Inject ERP Content and Generate Branding
      run: |
        # 1. Locate the project root securely
        GRADLE_PATH=$(find source_code -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
        GRADLE_DIR=$(dirname "$GRADLE_PATH")
        PARENT_DIR=$(dirname "$GRADLE_DIR")
        
        cd "$PARENT_DIR"
        
        # 2. Install Capacitor core and Asset Generator
        npm init -y
        npm install @capacitor/android @capacitor/core @capacitor/cli @capacitor/assets
        
        # 3. Locate the 'out' directory and inject it into Android
        # Based on your config, this holds the actual compiled School ERP
        OUT_DIR=$(find . -type d -name "out" -not -path "*/node_modules/*" | head -n 1)
        
        if [ -n "$OUT_DIR" ]; then
          echo "Found compiled 'out' directory. Injecting application..."
          mkdir -p "$GRADLE_DIR/app/src/main/assets/public"
          cp -r "$OUT_DIR"/* "$GRADLE_DIR/app/src/main/assets/public/"
        else
          echo "Warning: Could not find the 'out' directory."
        fi
        
        # 4. Locate the specific icon in public/assets/
        mkdir -p assets
        ICON_PATH=$(find . -type f -path "*/public/assets/icon.png" -not -path "*/node_modules/*" | head -n 1)
        
        if [ -n "$ICON_PATH" ]; then
          echo "Found Sacred Heart branding at $ICON_PATH. Generating splash screens..."
          cp "$ICON_PATH" assets/icon.png
          cp "$ICON_PATH" assets/splash.png
          
          # Slice the image into the required Android mipmap/drawable folders
          npx @capacitor/assets generate --android
        else
          echo "Warning: icon.png not found in public/assets/"
        fi

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        GRADLE_PATH=$(find source_code -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
        GRADLE_DIR=$(dirname "$GRADLE_PATH")
        
        echo "Compiling Android app in: $GRADLE_DIR"
        cd "$GRADLE_DIR"
        
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: edunest-debug-apk
        path: '**/*.apk'
        
