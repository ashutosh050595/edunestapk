name: Build EduNest Capacitor APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Unzip Source Files
      run: unzip app.zip -d source_code

    - name: Force Install Capacitor Libraries
      run: |
        # Find the actual gradlew file, strictly ignoring any node_modules
        GRADLE_PATH=$(find source_code -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
        
        if [ -z "$GRADLE_PATH" ]; then
          echo "Error: Could not find gradlew."
          exit 1
        fi
        
        # Navigate to the parent directory to install Node modules
        GRADLE_DIR=$(dirname "$GRADLE_PATH")
        PARENT_DIR=$(dirname "$GRADLE_DIR")
        
        echo "Navigating to project root: $PARENT_DIR"
        cd "$PARENT_DIR"
        
        echo "Installing Capacitor dependencies..."
        npm init -y
        npm install @capacitor/android @capacitor/core @capacitor/cli
        
        npx cap sync android || echo "Sync skipped, continuing build..."

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        # Find gradlew again, ensuring we are in your actual project folder
        GRADLE_PATH=$(find source_code -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
        GRADLE_DIR=$(dirname "$GRADLE_PATH")
        
        echo "Building Android app in: $GRADLE_DIR"
        cd "$GRADLE_DIR"
        
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: edunest-debug-apk
        path: '**/*.apk'
        
