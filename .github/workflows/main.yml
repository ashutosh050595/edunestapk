name: Build EduNest Capacitor APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Unzip Source Files
      run: unzip app.zip -d source_code

    - name: Force Install Capacitor Libraries
      run: |
        # 1. Locate the 'android' folder
        ANDROID_DIR=$(find source_code -type d -name "android" | head -n 1)
        
        if [ -z "$ANDROID_DIR" ]; then
          echo "Error: Could not find the android directory."
          exit 1
        fi
        
        # 2. Go to the parent folder (where node_modules is supposed to be)
        PARENT_DIR=$(dirname "$ANDROID_DIR")
        echo "Navigating to project root: $PARENT_DIR"
        cd "$PARENT_DIR"
        
        # 3. Force create a basic Node project and download the missing Android library
        echo "Downloading @capacitor/android to satisfy Gradle..."
        npm init -y
        npm install @capacitor/android @capacitor/core @capacitor/cli
        
        # 4. Sync files if possible
        npx cap sync android || echo "Sync skipped, continuing build..."

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        # Find the android folder again and run the build
        ANDROID_DIR=$(find source_code -type d -name "android" | head -n 1)
        cd "$ANDROID_DIR"
        
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: edunest-debug-apk
        path: '**/*.apk'
        
